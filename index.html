<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina Porto Antico - Gestionale Turni Cloud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{background:#f3f6fb;color:#1f2d3d;padding:18px}
.hidden{display:none!important}
h1{color:#082b4d}.sub{color:#64748b;margin:4px 0 18px}
.card{background:white;border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.07);margin-bottom:18px}
button{border:0;border-radius:12px;padding:11px 15px;font-weight:bold;cursor:pointer;background:#e8eef6;color:#082b4d}
button.active,button.primary{background:#082b4d;color:white}
button.green{background:#16803c;color:white}
button.orange{background:#d97706;color:white}
button.red{background:#dc2626;color:white}
button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{width:100%;padding:9px;border-radius:9px;border:1px solid #cbd5e1;background:white}
textarea{min-height:70px;resize:vertical}
.tabs,.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.stat strong{font-size:26px;color:#082b4d}
table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}
th,td{padding:8px;border-bottom:1px solid #e9eef5;text-align:center;font-size:12px;vertical-align:top}
th{background:#082b4d;color:white}
td:first-child,th:first-child{text-align:left;font-weight:bold;min-width:120px}
.badge{display:inline-block;padding:5px 9px;border-radius:20px;color:white;font-size:11px}
.ok{background:#16803c}.warn{background:#d97706}.bad{background:#dc2626}.info{background:#0b5f99}
.request-item{padding:10px 12px;border-radius:12px;margin-bottom:8px;background:#f8fafc;border:1px solid #e2e8f0}
.small{font-size:12px;color:#64748b}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.login-wrap{min-height:90vh;display:flex;align-items:center;justify-content:center}
.login-card{max-width:420px;width:100%}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.service-note{background:#fff;border-left:5px solid #082b4d;border-radius:10px;padding:8px;margin-top:8px;font-size:12px}
.toast{position:fixed;right:18px;bottom:18px;background:#082b4d;color:white;padding:13px 16px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.18);z-index:99;max-width:320px}
.manual-btn{font-size:10px;padding:6px 8px;border-radius:8px;margin-top:6px;background:#eef2ff;color:#082b4d;width:100%}
.select-mini{font-size:11px;padding:6px;border-radius:8px;min-width:105px}

.nav-btn{position:relative}
.notify-dot{
  display:none;
  position:absolute;
  top:-5px;
  right:-5px;
  width:13px;
  height:13px;
  background:#dc2626;
  border:2px solid white;
  border-radius:50%;
  box-shadow:0 0 0 2px rgba(220,38,38,.15);
}
.notify-dot.show{display:block}

@media(max-width:900px){ table{display: block; overflow-x: auto;} }
/* Righe alternate nella tabella turni manager */
.manager-table tbody tr:nth-child(odd){
  background:#ffffff;
}

.manager-table tbody tr:nth-child(even){
  background:#eef7ff;
}

.manager-table tbody tr:hover{
  background:#dbeafe;
}
</style>
</head>
<body>

<div id="loginPage" class="login-wrap">
  <div class="card login-card">
    <h1>⚓ Marina Porto Antico</h1>
    <div class="sub">Accesso gestionale turni CLOUD</div>
    <label>Username</label>
    <input id="username" placeholder="es. username">
    <br><br>
    <label>Password</label>
    <input id="password" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <br><br>
    <button class="primary" style="width:100%" onclick="login()">Entra</button>
    <div id="loginError" class="alert hidden" style="margin-top:14px; color:red">Login errato</div>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="top">
    <div>
      <h1>⚓ Marina Porto Antico</h1>
      <div class="sub" id="cloudStatus">Sincronizzazione Cloud...</div>
    </div>
    <div>
      <div class="small">Utente: <b id="currentUserName"></b></div>
      <button class="red" onclick="logout()">Esci</button>
    </div>
  </div>

  <div class="tabs">
    <button id="nav-planner" class="nav-btn" onclick="showPage('planner')">📅 Manager Turni<span id="dot-planner" class="notify-dot"></span></button>
    <button id="nav-staff" class="nav-btn" onclick="showPage('staff')">👀 Vista Staff (Tutti)<span id="dot-staff" class="notify-dot"></span></button>
    <button id="nav-requests" class="nav-btn" onclick="showPage('requests')">🌴 Ferie / Permessi<span id="dot-requests" class="notify-dot"></span></button>
    <button id="nav-sick" class="nav-btn" onclick="showPage('sick')">🤒 Malattia<span id="dot-sick" class="notify-dot"></span></button>
    <button id="nav-notes" class="nav-btn" onclick="showPage('notes')">📝 Comunicazioni<span id="dot-notes" class="notify-dot"></span></button>
  </div>

  <div class="grid">
    <div class="card stat">
      <div>Periodo Operativo</div>
      <strong id="monthTitle"></strong>
      <input type="month" id="monthPicker" onchange="changeMonth()">
    </div>
    <div class="card stat">
      <div>Sincronizzazione</div>
      <button class="green" id="btnSave" onclick="save()">💾 SALVA TURNI ONLINE</button>
      <button onclick="load()" style="margin-top: 5px; font-size: 11px">Aggiorna Dati</button>
    </div>
  </div>

  <section id="page-planner">
    <div class="controls">
      <button id="view-week" class="active" onclick="setView('week')">Settimana</button>
      <button id="view-month" onclick="setView('month')">Mese</button>
      <button onclick="movePeriod(-1)">← Prec</button>
      <button onclick="movePeriod(1)">Succ →</button>
      <button class="orange" onclick="autoGenerateWeek()">Replica settimana precedente</button>
      <button class="red" onclick="clearVisiblePeriod()">Pulisci periodo</button>
      <button class="green" onclick="addCustomShift()">➕ Nuovo turno</button>
      <button class="red" onclick="deleteCustomShift()">🗑️ Cancella turno</button>
    </div>
    <div class="card">
      <div id="periodTitle" class="small" style="margin-bottom:10px"></div>
      <div id="plannerContainer"></div>
    </div>
  </section>

  <section id="page-staff" class="hidden">
  <div class="card">
    <h2>Turni di tutto lo Staff</h2>

    <div class="controls">
      <button onclick="movePeriod(-1)">← Prec</button>
      <button onclick="movePeriod(1)">Succ →</button>
    </div>

    <div id="staffPeriodTitle" class="small" style="margin-bottom:10px"></div>
    <div id="staffContainer"></div>
  </div>
</section>

  <section id="page-requests" class="hidden">
    <div class="grid">
      <div class="card">
        <h2>Nuova Richiesta</h2>
        <label>Dipendente</label>
        <select id="requestEmployee" style="margin-top:5px; margin-bottom:10px"></select>
        <label>Tipo</label>
        <select id="requestType" style="margin-top:5px; margin-bottom:10px">
          <option>Ferie</option>
          <option>Permesso</option>
        </select>
        <label>Dal</label>
        <input id="requestFrom" type="date" style="margin-top:5px; margin-bottom:10px">
        <label>Al</label>
        <input id="requestTo" type="date" style="margin-top:5px; margin-bottom:10px">
        <label>Note</label>
        <textarea id="requestNote" placeholder="Motivo richiesta..." style="margin-top:5px; margin-bottom:10px"></textarea>
        <button class="primary" id="btnSubmitReq" style="width:100%" onclick="submitRequest()">Invia Richiesta Online</button>
      </div>
      <div class="card">
        <h2>Storico Richieste</h2>
        <div id="requestsList"></div>
      </div>
    </div>
  </section>

  <section id="page-sick" class="hidden">
    <div class="grid">
      <div class="card">
        <h2>Segnala Malattia</h2>
        <select id="sickEmployee" style="margin-top:10px"></select>
        <input id="sickFrom" type="date" style="margin-top:10px">
        <input id="sickTo" type="date" style="margin-top:10px">
        <button class="red" style="margin-top:10px; width:100%" onclick="submitSick()">Registra Malattia Online</button>
      </div>
      <div class="card">
        <h2>Registro Assenze</h2>
        <div id="sickList"></div>
      </div>
    </div>
  </section>

  <section id="page-notes" class="hidden">
    <div class="card">
      <h2>Comunicazioni di Servizio</h2>
      <input id="noteDate" type="date" style="margin-top:10px">
      <textarea id="noteText" placeholder="Messaggio per lo staff..." style="margin-top:10px"></textarea>
      <button class="primary" style="margin-top:10px; width:100%" onclick="saveServiceNote()">Pubblica Nota Online</button>
      <div id="notesList" style="margin-top:20px"></div>
    </div>
  </section>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// --- CONFIGURAZIONE ---
const SUPABASE_URL = "https://wnosmlcnqrjfymzjxjnd.supabase.co";
const SUPABASE_KEY = "sb_publishable_kk5hrv0K6em-ZCj-VGZkGw_lHsgFUTc";
const SUPABASE_TABLE = "app_data";
const SUPABASE_RECORD_ID = "marina_porto_antico";

const users={
  manager:{password:'manager123',name:'Manager',role:'manager',employeeId:null},
  gabriele:{password:'gabriele321',name:'Gabriele',role:'manager',employeeId:null},
  djily:{password:'3344',name:'Djily',role:'staff',employeeId:'djily'},
  security:{password:'1234',name:'Security',role:'staff',employeeId:'security'},
  alessandro:{password:'3639',name:'Alessandro',role:'staff',employeeId:'alessandro'},
  fabio:{password:'4554',name:'Fabio',role:'staff',employeeId:'fabio'},
  luca:{password:'6632',name:'Luca',role:'staff',employeeId:'luca'},
  riccardos:{password:'7472',name:'Riccardo S.',role:'staff',employeeId:'riccardos'},
  nicolas:{password:'5272',name:'Nicolas',role:'staff',employeeId:'nicolas'},
  vasili:{password:'9432',name:'Vasili',role:'staff',employeeId:'vasili'},
  riccardol:{password:'3765',name:'Riccardo L.',role:'staff',employeeId:'riccardol'},
  maurizio:{password:'9912',name:'Maurizio',role:'staff',employeeId:'maurizio'}
};

const employees=[
  {id:'gabriele',name:'Gabriele',roles:['ormeggio'],color:'#0369a1'},
  {id:'alessandro',name:'Alessandro',roles:['ormeggio'],color:'#0b5f99'},
  {id:'fabio',name:'Fabio',roles:['ormeggio'],color:'#16803c'},
  {id:'luca',name:'Luca',roles:['ormeggio'],color:'#d97706'},
  {id:'riccardos',name:'Riccardo S.',roles:['ormeggio'],color:'#7c3aed'},
  {id:'nicolas',name:'Nicolas',roles:['ormeggio'],color:'#dc2626'},
  {id:'djily',name:'Djily',roles:['ormeggio'],color:'#2563eb'},
  {id:'vasili',name:'Vasili',roles:['ormeggio','cassa'],color:'#0891b2'},
  {id:'riccardol',name:'Riccardo L.',roles:['cassa'],color:'#be185d'},
  {id:'maurizio',name:'Maurizio',roles:['cassa'],color:'#475569'},
  {id:'security',name:'Security',roles:['cassa'],color:'#111827'}
];

const mooringShiftOptions={none:'-','08:00-16:30':'08:00-16:30','10:00-18:30':'10:00-18:30','08:00-18:30':'08:00-18:30','09:00-19:30':'09:00-19:30','10:00-20:30':'10:00-20:30'};
const cashShiftOptions={none:'-','08:00-16:30':'08:00-16:30','10:00-18:30':'10:00-18:30','08:00-18:30':'08:00-18:30','09:00-19:30':'09:00-19:30','10:00-20:30':'10:00-20:30'};
const absenceOptions={riposo:'Riposo',ferie:'Ferie',permesso:'Permesso',malattia:'Malattia'};

let state={
  currentUser:null,
  currentDate:new Date(),
  view:'week',
  weekOffset:0,
  shifts:{},
  requests:[],
  sick:[],
  notes:{},
  customShiftOptions:{},
  lastUpdates:{shifts:0,requests:0,sick:0,notes:0},
  activePage:null,
  refreshTimer:null,
  smartRefreshTimer:null,
  lastKnownUpdatedAt:null,
  realtimeClient:null,
  realtimeChannel:null,
  realtimeDebounceTimer:null
};

// --- NOTIFICHE PALLINO ROSSO ---
function normalizeLastUpdates(obj){
  return {
    shifts:Number(obj?.shifts || 0),
    requests:Number(obj?.requests || 0),
    sick:Number(obj?.sick || 0),
    notes:Number(obj?.notes || 0)
  };
}

function touchUpdate(section){
  if(!state.lastUpdates) state.lastUpdates={shifts:0,requests:0,sick:0,notes:0};
  state.lastUpdates[section]=Date.now();
}

function seenStorageKey(){
  return state.currentUser ? `mpa_seen_${state.currentUser.username}` : 'mpa_seen_guest';
}

function getSeen(){
  try{
    return JSON.parse(localStorage.getItem(seenStorageKey())) || {};
  }catch(e){
    return {};
  }
}

function setSeen(seen){
  localStorage.setItem(seenStorageKey(), JSON.stringify(seen));
}

function pageSections(page){
  if(page==='planner') return ['shifts'];
  if(page==='staff') return ['shifts'];
  if(page==='requests') return ['requests'];
  if(page==='sick') return ['sick'];
  if(page==='notes') return ['notes'];
  return [];
}

function markPageSeen(page){
  const seen=getSeen();
  pageSections(page).forEach(section=>{
    seen[section]=state.lastUpdates[section] || 0;
  });
  setSeen(seen);
  updateNotificationDots();
}

function setDot(id, show){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('show', !!show);
}

function updateNotificationDots(){
  if(!state.currentUser) return;

  const seen=getSeen();
  const hasNew={
    shifts:(state.lastUpdates.shifts || 0) > (seen.shifts || 0),
    requests:(state.lastUpdates.requests || 0) > (seen.requests || 0),
    sick:(state.lastUpdates.sick || 0) > (seen.sick || 0),
    notes:(state.lastUpdates.notes || 0) > (seen.notes || 0)
  };

  setDot('dot-planner', hasNew.shifts && state.currentUser.role==='manager');
  setDot('dot-staff', hasNew.shifts);
  setDot('dot-requests', hasNew.requests);
  setDot('dot-sick', hasNew.sick);
  setDot('dot-notes', hasNew.notes);
}

// --- REALTIME SUPABASE PER STAFF ---
function startRealtime(){
    if(!state.currentUser || state.currentUser.role === 'manager') return;

    if(!window.supabase){
        console.warn("Libreria Supabase Realtime non caricata.");
        return;
    }

    stopRealtime();

    state.realtimeClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    state.realtimeChannel = state.realtimeClient
        .channel('marina-porto-antico-realtime-' + state.currentUser.username)
        .on(
            'postgres_changes',
            {
                event: '*',
                schema: 'public',
                table: SUPABASE_TABLE
            },
            function(payload){
                if(!state.currentUser || state.currentUser.role === 'manager') return;

                const newId = payload.new && payload.new.id ? payload.new.id : null;
                const oldId = payload.old && payload.old.id ? payload.old.id : null;

                if(newId !== SUPABASE_RECORD_ID && oldId !== SUPABASE_RECORD_ID){
                    return;
                }

                console.log("Modifica ricevuta da Supabase Realtime:", payload);

                if(state.realtimeDebounceTimer){
                    clearTimeout(state.realtimeDebounceTimer);
                }

                state.realtimeDebounceTimer = setTimeout(async function(){
                    await load(true);
                    toast("Turni aggiornati in tempo reale ✅");
                }, 400);
            }
        )
        .subscribe(function(status){
            console.log("Stato Realtime:", status);

            if(status === 'SUBSCRIBED'){
                console.log("Realtime Supabase attivo per lo staff");
            }

            if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED'){
                console.warn("Realtime Supabase non disponibile:", status);
            }
        });
}

function stopRealtime(){
    if(state.realtimeDebounceTimer){
        clearTimeout(state.realtimeDebounceTimer);
        state.realtimeDebounceTimer = null;
    }

    if(state.realtimeClient && state.realtimeChannel){
        state.realtimeClient.removeChannel(state.realtimeChannel);
    }

    state.realtimeChannel = null;
    state.realtimeClient = null;
}

// --- SMART REFRESH PER STAFF ---
async function checkForCloudUpdates(){
    if(!state.currentUser || state.currentUser.role === 'manager') return;

    try{
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_RECORD_ID}&select=updated_at`,
            {
                headers:{
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    "Cache-Control": "no-cache"
                }
            }
        );

        if(!res.ok) throw new Error("Errore controllo aggiornamenti");

        const rows = await res.json();
        const remoteUpdatedAt = rows[0]?.updated_at || null;

        if(!remoteUpdatedAt) return;

        if(!state.lastKnownUpdatedAt){
            state.lastKnownUpdatedAt = remoteUpdatedAt;
            return;
        }

        if(remoteUpdatedAt !== state.lastKnownUpdatedAt){
            state.lastKnownUpdatedAt = remoteUpdatedAt;
            await load(true);
            toast("Turni aggiornati automaticamente ✅");
        }

    }catch(e){
        console.warn("Smart refresh non riuscito:", e);
    }
}

function startSmartRefresh(){
    if(!state.currentUser || state.currentUser.role === 'manager') return;

    stopSmartRefresh();

    state.smartRefreshTimer = setInterval(function(){
        checkForCloudUpdates();
    }, 15000);

    console.log("Smart Refresh attivato per lo staff");
}

function stopSmartRefresh(){
    if(state.smartRefreshTimer){
        clearInterval(state.smartRefreshTimer);
        state.smartRefreshTimer = null;
    }
}

// --- MOTORE CLOUD SUPABASE ---
function buildCloudPayload(){
    return {
        shifts: state.shifts,
        requests: state.requests,
        sick: state.sick,
        notes: state.notes,
        customShiftOptions: state.customShiftOptions,
        lastUpdates: state.lastUpdates
    };
}

function applyCloudData(record){
    record = record || {};

    state.shifts = record.shifts || {};
    state.requests = record.requests || [];
    state.sick = record.sick || [];
    state.notes = record.notes || {};
    state.customShiftOptions = record.customShiftOptions || {};
    state.lastUpdates = normalizeLastUpdates(record.lastUpdates);
}

async function load(showAutoNotice = false) {
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_RECORD_ID}&select=data,updated_at`,
            {
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    "Cache-Control": "no-cache"
                }
            }
        );

        if(!res.ok) throw new Error("Errore lettura Supabase");

        const rows = await res.json();

        state.lastKnownUpdatedAt = rows[0]?.updated_at || state.lastKnownUpdatedAt;

        const record = rows[0]?.data || {};

        applyCloudData(record);

        document.getElementById('cloudStatus').textContent = "Aggiornato Supabase: " + new Date().toLocaleTimeString();
        renderAll();

        if(state.activePage){
            markPageSeen(state.activePage);
        }else{
            updateNotificationDots();
        }

    } catch(e) { 
        console.error(e);
        document.getElementById('cloudStatus').textContent = "Errore Connessione Supabase ❌";
    }
}

async function save(section) {
    try {
        if(section) touchUpdate(section);

        toast("Salvataggio in corso...");

        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_RECORD_ID}`,
            {
                method: 'PATCH',
                headers: {
                    "Content-Type": "application/json",
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    Prefer: "return=minimal"
                },
                body: JSON.stringify({
                    data: buildCloudPayload(),
                    updated_at: new Date().toISOString()
                })
            }
        );

        if(!res.ok) throw new Error("Errore salvataggio Supabase");

        toast("Dati salvati su Supabase ✅");
        await load();

    } catch(e) {
        console.error(e);
        toast("Errore di rete Supabase");
    }
}

// --- LOGICA LOGIN ---
function login(){
    const u=document.getElementById('username').value.trim().toLowerCase();
    const p=document.getElementById('password').value;
    if(!users[u]||users[u].password!==p){
        document.getElementById('loginError').classList.remove('hidden');
        return;
    }
    state.currentUser={username:u,...users[u]};
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('currentUserName').textContent=state.currentUser.name;
    document.getElementById('nav-planner').style.display = (state.currentUser.role==='manager') ? 'inline-block' : 'none';
    
    fillEmployeeSelects();

    if(state.refreshTimer) clearInterval(state.refreshTimer);
    stopRealtime();
    stopSmartRefresh();

    // Avvia aggiornamento automatico SOLO se l'utente NON è un manager
    // Questo protegge sia 'manager' che 'gabriele' (entrambi role: 'manager')
    if (state.currentUser.role !== 'manager') {
        state.refreshTimer = setInterval(function(){
            load(true);
        }, 300000); // Refresh ogni 5 minuti per lo staff

        startRealtime();      // Se funziona, aggiorna subito
        startSmartRefresh();  // Controllo intelligente ogni 15 secondi

        console.log("Refresh automatico + Realtime + Smart Refresh attivati per lo staff");
    } else {
        console.log("Aggiornamenti automatici disattivati per il Manager (protezione modifiche)");
    }

    showPage(state.currentUser.role==='manager'?'planner':'staff');
}
function showPage(p){
    state.activePage=p;

    ['planner','staff','requests','sick','notes'].forEach(id=>{
      document.getElementById('page-'+id).classList.toggle('hidden',id!==p);
      const nav=document.getElementById('nav-'+id);
      if(nav) nav.classList.toggle('active',id===p);
    });

    load().then(()=>markPageSeen(p));
}

function renderAll(){
    document.getElementById('monthTitle').textContent=state.currentDate.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
    renderPlanner();
    renderStaff();
    renderRequests();
    renderSick();
    renderNotes();
    updateNotificationDots();
}

function renderPlanner(){
    const cont = document.getElementById('plannerContainer');
    const dates = visibleDates();
    document.getElementById('periodTitle').textContent = periodLabel(dates);
    
    let html='<table class="manager-table"><thead><tr><th>Staff</th>';
    dates.forEach(d=>html+=`<th>${dayHeader(d)}</th>`);
    html+='<th>Ore</th></tr></thead><tbody>';

    employees.forEach(emp=>{
        html+=`<tr><td><span class="dot" style="background:${emp.color}"></span><b>${emp.name}</b></td>`;
        dates.forEach(d=>{
            const k=dateKey(d);
            const current = state.shifts[k]?.[emp.id]?.shift || 'none';
            html+=`<td>${shiftEditor(emp, k, current)}</td>`;
        });
        html+=`<td style="font-weight:bold">${employeeHours(emp.id, dates).toFixed(1)}</td></tr>`;
    });
    cont.innerHTML = html + '</tbody></table>';
}

function shiftEditor(emp, date, shift){
    const isManager = state.currentUser.role === 'manager';
    const disabled = !isManager ? 'disabled' : '';
    const baseOpts = emp.roles.includes('cassa') ? cashShiftOptions : mooringShiftOptions;
    const allOpts = {...baseOpts, ...(state.customShiftOptions || {}), ...absenceOptions};
    
    let html = `<select class="select-mini" ${disabled} onchange="updateShift('${emp.id}','${date}',this.value)">`;
    Object.entries(allOpts).forEach(([v,l])=> html+=`<option value="${v}" ${shift===v?'selected':''}>${l}</option>`);
    if(!allOpts[shift] && shift !== 'none') html+=`<option value="${shift}" selected>${shift}</option>`;
    html += '</select>';
    if(isManager) html+=`<button class="manual-btn" onclick="setManualShift('${emp.id}','${date}')">Modifica</button>`;
    return html;
}
function renderStaff(){
    const cont = document.getElementById('staffContainer');
    const dates = visibleDates();

    document.getElementById('staffPeriodTitle').textContent = periodLabel(dates);

    let html='<table><thead><tr><th>Dipendente</th>';
    dates.forEach(d=>html+=`<th>${dayHeader(d)}</th>`);
    html+='</tr></thead><tbody>';
    employees.forEach(emp=>{
        const isMe = emp.id === state.currentUser.employeeId;
        html+=`<tr ${isMe?'style="background:#f0f7ff"':''}><td><span class="dot" style="background:${emp.color}"></span><b>${emp.name}</b></td>`;
        dates.forEach(d=>{
            const k=dateKey(d);
            const s=state.shifts[k]?.[emp.id]?.shift || '-';

let badgeClass = '';

if(s === 'riposo'){
    badgeClass = 'warn';   // arancione
} else if(['ferie','permesso','malattia'].includes(s)){
    badgeClass = 'bad';    // rosso
} else if(s !== '-'){
    badgeClass = 'ok';     // verde
}

html+=`<td><span class="badge ${badgeClass}">${s}</span></td>`;
        });
        html+='</tr>';
    });
    cont.innerHTML = html + '</tbody></table>';
}

function updateShift(empId, date, val){
    if(!state.shifts[date]) state.shifts[date]={};
    state.shifts[date][empId] = {shift: val, role: employees.find(e=>e.id===empId).roles[0]};
    touchUpdate('shifts');
    updateNotificationDots();
}

function setManualShift(empId, date){
    const val = prompt("Inserisci orario libero (es. 07:00-14:00)");
    if(val) { updateShift(empId, date, val); renderPlanner(); }
}

function autoGenerateWeek(){
    if(state.view !== 'week'){
        alert("La replica dei turni funziona solo in vista Settimana.");
        return;
    }

    if(!confirm("Replicare i turni degli ormeggiatori dalla settimana precedente?\n\nI cassieri non verranno modificati.\nFerie, permessi e malattia già inseriti nella settimana attuale non verranno sovrascritti.\nLe assenze della settimana precedente non verranno replicate.")) return;

    const currentWeek = visibleDates();

    const protectedCurrentValues = ['ferie','permesso','malattia'];
    const notReplicablePreviousValues = ['ferie','permesso','malattia','riposo','none','-'];

    currentWeek.forEach(function(currentDay){
        const currentKey = dateKey(currentDay);

        const previousDay = new Date(currentDay);
        previousDay.setDate(previousDay.getDate() - 7);
        const previousKey = dateKey(previousDay);

        if(!state.shifts[currentKey]){
            state.shifts[currentKey] = {};
        }

        employees.forEach(function(emp){
            const isOrmeggiatore = emp.roles.indexOf('ormeggio') !== -1;
            const isCassiereSolo = emp.roles.indexOf('cassa') !== -1 && emp.roles.indexOf('ormeggio') === -1;

            if(!isOrmeggiatore || isCassiereSolo){
                return;
            }

            const currentData = state.shifts[currentKey][emp.id];
            const currentShift = currentData ? currentData.shift : null;

            if(protectedCurrentValues.indexOf(currentShift) !== -1){
                return;
            }

            const previousData = state.shifts[previousKey] ? state.shifts[previousKey][emp.id] : null;
            const previousShift = previousData ? previousData.shift : null;

            if(!previousShift || notReplicablePreviousValues.indexOf(previousShift) !== -1){
                state.shifts[currentKey][emp.id] = {shift:'none', role:'ormeggio'};
                return;
            }

            state.shifts[currentKey][emp.id] = {
                shift: previousShift,
                role: 'ormeggio'
            };
        });
    });

    touchUpdate('shifts');
    renderAll();
    toast("Turni ormeggiatori replicati correttamente ✅");
}

async function addCustomShift(){
    if(state.currentUser.role !== 'manager') return;

    const val = prompt("Inserisci nuovo orario turno, es. 07:30-15:30");

    if(!val) return;

    const clean = val.trim();

    if(!/^\d{2}:\d{2}-\d{2}:\d{2}$/.test(clean)){
        alert("Formato non valido. Usa questo formato: 07:30-15:30");
        return;
    }

    const [start,end] = clean.split('-');
    const [h1,m1] = start.split(':').map(Number);
    const [h2,m2] = end.split(':').map(Number);

    if(h1 > 23 || h2 > 23 || m1 > 59 || m2 > 59){
        alert("Orario non valido.");
        return;
    }

    if((h2*60+m2) <= (h1*60+m1)){
        alert("L'orario di fine deve essere successivo a quello di inizio.");
        return;
    }

    if(!state.customShiftOptions) state.customShiftOptions = {};

    state.customShiftOptions[clean] = clean;

    touchUpdate('shifts');
    renderAll();
    await save('shifts');

    toast("Nuovo turno aggiunto ai menu ✅");
}
async function deleteCustomShift(){
    if(state.currentUser.role !== 'manager') return;

    const custom = state.customShiftOptions || {};
    const keys = Object.keys(custom);

    if(keys.length === 0){
        alert("Non ci sono turni personalizzati da cancellare.");
        return;
    }

    const elenco = keys.map((k,i)=>`${i+1}) ${k}`).join('\n');
    const scelta = prompt("Quale turno vuoi cancellare dal menu?\n\n" + elenco + "\n\nInserisci il numero:");

    if(!scelta) return;

    const index = Number(scelta) - 1;

    if(isNaN(index) || index < 0 || index >= keys.length){
        alert("Scelta non valida.");
        return;
    }

    const turno = keys[index];

    if(!confirm(`Cancellare il turno "${turno}" dal menu a tendina?\n\nI turni già assegnati non verranno modificati.`)){
        return;
    }

    delete state.customShiftOptions[turno];

    touchUpdate('shifts');
    renderAll();
    await save('shifts');

    toast("Turno rimosso dal menu ✅");
}

function clearVisiblePeriod(){
    if(!confirm("Cancellare i turni visibili?")) return;
    visibleDates().forEach(d => delete state.shifts[dateKey(d)]);
    touchUpdate('shifts');
    renderAll();
}

// --- GESTIONE RICHIESTE ---
async function submitRequest(){
    const btn = document.getElementById('btnSubmitReq');
    btn.disabled = true;
    
    const empId = document.getElementById('requestEmployee').value;
    const from = document.getElementById('requestFrom').value;
    const to = document.getElementById('requestTo').value;
    const type = document.getElementById('requestType').value;
    const note = document.getElementById('requestNote').value;

    if(!from || !to) {
        alert("Scegli le date!");
        btn.disabled = false;
        return;
    }

    try {
        await load();

        const newReq = {
            id: Date.now(),
            employeeId: empId,
            type,
            from,
            to,
            note,
            status: 'In attesa'
        };

        state.requests.unshift(newReq);
        touchUpdate('requests');

        await save();

        toast("Richiesta inviata con successo!");
        document.getElementById('requestNote').value = "";

    } catch(e) {
        console.error(e);
        alert("Errore nell'invio. Riprova.");
    } finally {
        btn.disabled = false;
    }
}

function renderRequests(){
    const cont = document.getElementById('requestsList');
    const list = (state.currentUser.role === 'manager') 
                 ? state.requests 
                 : state.requests.filter(r => r.employeeId === state.currentUser.employeeId);

    if(!list || list.length === 0) { cont.innerHTML = "<div class='small'>Nessuna richiesta trovata.</div>"; return; }
    
    cont.innerHTML = list.map(r=>`
        <div class="request-item">
            <b>${r.type}</b> - ${employeeName(r.employeeId)}<br>
            <small>Dal ${r.from} al ${r.to}</small><br>
            <span class="badge ${r.status==='Approvata'?'ok':(r.status==='Respinta'?'bad':'warn')}">${r.status}</span>
            ${state.currentUser.role==='manager' && r.status==='In attesa' ? `
                <div style="margin-top:8px">
                    <button class="green" style="padding:4px 8px; font-size:11px" onclick="approveReq(${r.id}, 'Approvata')">Approva</button>
                    <button class="red" style="padding:4px 8px; font-size:11px" onclick="approveReq(${r.id}, 'Respinta')">Respingi</button>
                </div>
            `:''}
        </div>
    `).join('');
}

async function approveReq(id, status){
    const r = state.requests.find(x=>x.id===id);
    if(!r) return;
    
    r.status = status;
    touchUpdate('requests');

    if(status === 'Approvata'){
        let d = new Date(r.from);
        while(d <= new Date(r.to)){
            updateShift(r.employeeId, dateKey(d), r.type.toLowerCase());
            d.setDate(d.getDate()+1);
        }
    }

    await save();
}

// --- ALTRE FUNZIONI ---
async function submitSick(){
    const empId = document.getElementById('sickEmployee').value;
    const from = document.getElementById('sickFrom').value;
    const to = document.getElementById('sickTo').value;
    if(!from || !to) return;
    let d = new Date(from);
    while(d <= new Date(to)){
        updateShift(empId, dateKey(d), 'malattia');
        d.setDate(d.getDate()+1);
    }
    state.sick.unshift({empId, from, to});
    await save('sick');
}

function renderSick(){
    const cont = document.getElementById('sickList');
    cont.innerHTML = state.sick.map(s=>`<div class="request-item"><b>${employeeName(s.empId)}</b>: ${s.from} al ${s.to}</div>`).join('');
}

async function saveServiceNote(){
    const d = document.getElementById('noteDate').value;
    const t = document.getElementById('noteText').value;
    if(d && t) {
        state.notes[d] = {text: t, author: state.currentUser.name};

}

function renderNotes(){
    const cont = document.getElementById('notesList');
    cont.innerHTML = Object.entries(state.notes).sort().map(([d, n])=>`
        <div class="request-item"><b>${d}</b>: ${n.text} <small>(${n.author})</small>
        ${state.currentUser.role==='manager'?`<button class="red" style="padding:2px 5px" onclick="deleteNote('${d}')">X</button>`:''}</div>
    `).join('');
}

async function deleteNote(d){ delete state.notes[d]; await save('notes'); }

// --- UTILITY ---
function visibleDates(){
    let d = new Date(state.currentDate);
    if(state.view==='week'){
        const day = (d.getDay()+6)%7;
        d.setDate(d.getDate()-day+(state.weekOffset*7));
        return Array.from({length:7}, (_,i)=>{ const x=new Date(d); x.setDate(x.getDate()+i); return x; });
    } else {
        const last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        return Array.from({length:last}, (_,i)=>new Date(d.getFullYear(), d.getMonth(), i+1));
    }
}
function dateKey(d){ return d.toISOString().split('T')[0]; }
function dayHeader(d){ return d.toLocaleDateString('it-IT',{weekday:'short',day:'2-digit'}); }
function periodLabel(dates){ return dates[0].toLocaleDateString() + " - " + dates[dates.length-1].toLocaleDateString(); }
function employeeHours(id, dates){ return dates.reduce((sum, d)=> sum + shiftHours(state.shifts[dateKey(d)]?.[id]?.shift), 0); }
function shiftHours(s){
    if(!s || ['riposo','ferie','permesso','malattia','none','-'].includes(s)) return 0;
    const [a,b] = s.split('-'); if(!a || !b) return 0;
    const [h1,m1] = a.split(':').map(Number); const [h2,m2] = b.split(':').map(Number);
    return ((h2*60+m2)-(h1*60+m1)-30)/60;
}
function employeeName(id){ return employees.find(e=>e.id===id)?.name || id; }

function fillEmployeeSelects(){
    ['requestEmployee','sickEmployee'].forEach(id=>{
        const el = document.getElementById(id);
        if(state.currentUser.role === 'manager'){
            el.innerHTML = employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
        } else {
            el.innerHTML = `<option value="${state.currentUser.employeeId}">${state.currentUser.name}</option>`;
        }
    });
}
function changeMonth(){
    const [y,m] = document.getElementById('monthPicker').value.split('-');
    state.currentDate = new Date(y, m-1, 1);
    state.weekOffset = 0;
    renderAll();
}
function movePeriod(n){ 
    if(state.view==='week') state.weekOffset+=n; 
    else state.currentDate.setMonth(state.currentDate.getMonth()+n); 
    renderAll(); 
}
function setView(v){ state.view=v; renderAll(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); }
function logout(){
    stopRealtime();
    stopSmartRefresh();

    if(state.refreshTimer){
        clearInterval(state.refreshTimer);
        state.refreshTimer = null;
    }

    location.reload();
}
